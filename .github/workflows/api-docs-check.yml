name: api-docs-check

on:
  pull_request:
    paths:
      - "backend/app/api/**"
      - "backend/app/schemas/**"
      - "backend/app/main.py"
      - "backend/scripts/dump_openapi.py"
      - "backend/scripts/build_api_md.py"
      - "docs/api/openapi.json"
      - ".github/workflows/api-docs-check.yml"

jobs:
  openapi-drift:
    name: OpenAPI schema drift check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Re-generate openapi.json
        working-directory: backend
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/dump_openapi.py --check

      - name: Re-generate per-tag Markdown
        run: python backend/scripts/build_api_md.py

      - name: Verify no drift in docs/api/
        run: |
          if ! git diff --quiet -- docs/api/; then
            echo "::error::API docs are stale. Run the following locally and commit the result:"
            echo "  cd backend && python scripts/dump_openapi.py --check && cd .. && python backend/scripts/build_api_md.py"
            echo ""
            echo "Drift diff:"
            git --no-pager diff -- docs/api/ | head -200
            exit 1
          fi
          echo "OK: docs/api/ is in sync with backend code."
