name: Alembic Smoke (PG-only)

# TD-CI-01 closure: validates that every alembic migration is reversible and
# idempotent against a real postgres:15 instance, and that the key models
# (with PG-only enums + payment columns) actually round-trip insert/query.
#
# SQLite-based unit tests use Base.metadata.create_all() and therefore do
# NOT exercise the alembic migration scripts at all — drifts are invisible
# until production. This workflow closes that gap.

on:
  pull_request:
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"
      - "backend/app/database.py"
      - ".github/workflows/alembic-smoke.yml"
  push:
    branches: [main]
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"
      - "backend/app/database.py"

jobs:
  alembic-smoke:
    name: Alembic upgrade / downgrade / upgrade (PG)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yiluan_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/yiluan_smoke
      ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/yiluan_smoke
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            echo "waiting for postgres... ($i)"
            sleep 1
          done
          echo "postgres did not become ready in 30s" >&2
          exit 1

      - name: Step 1 — alembic upgrade head (empty → latest)
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python -m alembic current

      - name: Step 2 — alembic downgrade base (latest → empty, full reversibility)
        working-directory: backend
        run: |
          python -m alembic downgrade base
          python -m alembic current

      - name: Step 3 — alembic upgrade head AGAIN (idempotency)
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python -m alembic current

      - name: Step 4 — alembic check (no model/migration drift)
        working-directory: backend
        run: python -m alembic check

      - name: Step 5 — PG-only model smoke tests (real enums, PG types)
        working-directory: backend
        env:
          # Force pytest to use real PG instead of the in-memory SQLite default
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/yiluan_smoke
          PG_SMOKE: "1"
        run: python -m pytest tests/test_models_pg_smoke.py -v
