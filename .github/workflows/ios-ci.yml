# =============================================================================
# iOS CI - XcodeGen + xcodebuild test
# -----------------------------------------------------------------------------
# Full CI pipeline for iOS: generate project, build, test, cache, artifacts.
# .xcodeproj is generated from ios/project.yml (gitignored).
#
# Runner cost: macos runners cost 10x on private repos (~200 free min/month
# at standard tier; a single full run takes ~12-18 min on a warm cache).
#
# OPS toggle: set repository variable IOS_CI_ENABLED=true to actually run.
# This lets OPS gate the workflow without editing the yml when budget /
# Apple Silicon runner allocation is uncertain (D-039).
# A `workflow_dispatch` invocation always runs, regardless of the variable.
# =============================================================================

name: iOS CI

on:
  push:
    branches: [main, ci/ios-green]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS Simulator)
    # Skip automatic runs unless OPS has flipped IOS_CI_ENABLED. Manual dispatch
    # always runs so engineers can validate without the toggle.
    # See docs/ios-ci.md for the enable checklist (D-039).
    if: ${{ github.event_name == 'workflow_dispatch' || vars.IOS_CI_ENABLED == 'true' }}
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          xcodegen --version
          xcrun simctl list runtimes | head -n 20
          echo '--- available iOS Simulator devices (iPhone) ---'
          xcrun simctl list devices available | grep -E 'iPhone' | head -n 30 || true

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Show build destinations (diagnostic)
        working-directory: ios
        run: |
          xcodebuild -project YiLuAn.xcodeproj -scheme YiLuAn -showdestinations 2>&1 | head -n 80 || true

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/project.yml', 'ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn || true

      - name: Pick iOS Simulator UDID
        id: sim
        shell: bash
        run: |
          # Robust picker (hard-coded name+OS=latest breaks when combo unavailable,
          # e.g. iPhone 15 Pro does not exist on iOS 18.x).
          UDID=$(xcrun simctl list devices available --json | python3 ios/scripts/pick_simulator.py)
          echo "Picked simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Pre-boot simulator (warm-up)
        shell: bash
        run: |
          # Pre-booting cuts ~30-60s of wall time off the first xcodebuild test
          # invocation; CoreSimulator is happier when the device is already up.
          set +e
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b || true
          exit 0

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee xcodebuild.log

      - name: Summarise xcresult
        if: always()
        working-directory: ios
        shell: bash
        run: |
          # Lightweight summary: extract test counts from the xcresult bundle so
          # the GH Actions UI shows pass/fail without needing the artifact.
          if [ -d TestResults.xcresult ]; then
            xcrun xcresulttool get --format json --path TestResults.xcresult \
              | python3 -c "import json,sys; d=json.load(sys.stdin); m=d.get('metrics',{}); print('::notice::iOS tests:', m)" \
              || echo "::warning::xcresulttool summary failed (non-fatal)"
          else
            echo "::warning::TestResults.xcresult not produced"
          fi

      - name: Upload xcresult artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results-${{ github.run_id }}
          path: |
            ios/TestResults.xcresult
            ios/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14
