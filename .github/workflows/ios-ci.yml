# =============================================================================
# iOS CI — XcodeGen + xcodebuild test
# -----------------------------------------------------------------------------
# Full CI pipeline for iOS: generate project, build, test, cache, artifacts.
# .xcodeproj is generated from ios/project.yml (gitignored).
#
# Runner cost: macos runners cost 10x on private repos (~200 free min/month).
# =============================================================================

name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          xcodegen --version
          xcrun simctl list runtimes | head -n 20
          echo '--- available iOS Simulator destinations ---'
          xcrun simctl list devices available | grep -E 'iPhone|iPad' | head -n 20 || true

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Show build destinations (diagnostic)
        working-directory: ios
        run: |
          xcodebuild -project YiLuAn.xcodeproj -scheme YiLuAn -showdestinations 2>&1 | head -n 40 || true

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/project.yml', 'ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn || true

      - name: Pick iOS Simulator destination
        id: sim
        run: |
          # Pick the first available iPhone simulator (iPhone 16/15/14 in that order).
          # Hard-coding 'iPhone 15 Pro' or 'iPhone 16' breaks when Xcode bumps device names.
          RUNTIME=$(xcrun simctl list runtimes available | grep -E 'iOS [0-9]+' | tail -n 1 | awk -F 'com.apple.CoreSimulator.SimRuntime.' '{print $2}')
          DEVICE=$(xcrun simctl list devices available "$RUNTIME" 2>/dev/null | grep -E 'iPhone 1[3-9]' | head -n 1 | sed -E 's/^[[:space:]]+([^(]+) \(.*/\1/' | xargs)
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -E 'iPhone 1[3-9]' | head -n 1 | sed -E 's/^[[:space:]]+([^(]+) \(.*/\1/' | xargs)
          fi
          echo "Picked: $DEVICE / $RUNTIME"
          echo "device=${DEVICE:-iPhone 15}" >> $GITHUB_OUTPUT

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=latest" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            ios/TestResults.xcresult
            ios/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14
