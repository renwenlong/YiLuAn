# =============================================================================
# iOS Tests CI — A21-10 / A21-FOLLOWUP
# -----------------------------------------------------------------------------
# .xcodeproj is generated on-the-fly from ios/project.yml via XcodeGen.
# Do NOT commit .xcodeproj (gitignored). Edit project.yml instead.
#
# Quota note: macos runners cost 10x normal minutes on private repos.
# Free tier on a private repo ≈ 200 macos-minutes/month. Each run ~ 6-10 min.
# If quota tightens later, switch to schedule-only or self-hosted runner.
# =============================================================================

name: ios-tests

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: xcodebuild test (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Show toolchain info
        run: |
          xcodebuild -version
          xcodegen --version
          xcrun simctl list runtimes | head -n 20

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # SPM cache — no-op until project adds SPM dependencies.
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn || true

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            ios/TestResults.xcresult
            ios/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14
