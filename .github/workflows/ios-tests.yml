# =============================================================================
# iOS Tests CI — A21-10 / A21-FOLLOWUP
# -----------------------------------------------------------------------------
# Superseded by .github/workflows/ios-ci.yml (the canonical iOS pipeline).
# Kept as a manual-only fallback so we don't burn double macOS minutes on every
# push. Trigger from the Actions tab when needed.
# =============================================================================

name: ios-tests

on:
  workflow_dispatch:

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: xcodebuild test (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Show toolchain info
        run: |
          xcodebuild -version
          xcodegen --version
          xcrun simctl list runtimes | head -n 20

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn || true

      - name: Pick iOS Simulator UDID
        id: sim
        shell: bash
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 ios/scripts/pick_simulator.py)
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project YiLuAn.xcodeproj \
            -scheme YiLuAn \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee xcodebuild.log

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            ios/TestResults.xcresult
            ios/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14
